<script>
// ── STORAGE HELPERS ─────────────────────────────────────────
// Uses IndexedDB for photos (large), localStorage for everything else
const IDB = (()=>{
  let db=null;
  function open(){
    return new Promise((res,rej)=>{
      if(db) return res(db);
      const req=indexedDB.open('TaseenOS',1);
      req.onupgradeneeded=e=>{e.target.result.createObjectStore('photos',{keyPath:'id',autoIncrement:true});};
      req.onsuccess=e=>{db=e.target.result;res(db);};
      req.onerror=()=>rej();
    });
  }
  async function savePhoto(dataUrl,name){
    const d=await open();
    return new Promise((res,rej)=>{
      const tx=d.transaction('photos','readwrite');
      tx.objectStore('photos').add({dataUrl,name,ts:Date.now()}).onsuccess=e=>res(e.target.result);
      tx.onerror=rej;
    });
  }
  async function getPhotos(){
    const d=await open();
    return new Promise((res,rej)=>{
      const tx=d.transaction('photos','readonly');
      const all=[];
      tx.objectStore('photos').openCursor().onsuccess=e=>{
        const c=e.target.result;
        if(c){all.push(c.value);c.continue();}
        else res(all);
      };
      tx.onerror=rej;
    });
  }
  async function delPhoto(id){
    const d=await open();
    return new Promise((res,rej)=>{
      const tx=d.transaction('photos','readwrite');
      tx.objectStore('photos').delete(id).onsuccess=res;
      tx.onerror=rej;
    });
  }
  return{savePhoto,getPhotos,delPhoto};
})();

function LS(k,v){if(v===undefined){try{return JSON.parse(localStorage.getItem(k));}catch{return null;}}else{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){alert('Storage quota exceeded. Please delete some files or photos.');}}}

// ── STATE ────────────────────────────────────────────────────
const AC=new (window.AudioContext||window.webkitAudioContext)();
let recents=new Set(),sndOn=true,calcVal='',swT=0,swIv;
let camStream=null,camFace='user';
let tracks=[],curTrack=-1,musicAudio=new Audio(),musicPlaying=false,vizIv;
musicAudio.addEventListener('ended',()=>nextTrack());
musicAudio.addEventListener('timeupdate',updateProg);
let snakeGame=null;
let alarms=[],alarmCheckIv;

// ── SOUND ────────────────────────────────────────────────────
function beep(f,d){if(!sndOn)return;try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.value=f;g.gain.setValueAtTime(.05,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}catch(e){}}

// ── BOOT ─────────────────────────────────────────────────────
function doBoot(){document.getElementById('boot').style.display='none';document.getElementById('os').style.display='block';beep(660,.6);restoreSettings();startAlarmCheck();}

// ── CLOCK ────────────────────────────────────────────────────
function tick(){const n=new Date();document.getElementById('clk').innerText=n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false});document.getElementById('dt').innerText=n.toLocaleDateString([],{weekday:'long',month:'short',day:'numeric'}).toUpperCase();}
setInterval(tick,1000);tick();

// ── NAV ──────────────────────────────────────────────────────
function handleLeft(){document.getElementById('rv').style.display==='flex'?clearRecents():showRecents();}
function showRecents(){
  const rv=document.getElementById('rv'),rl=document.getElementById('rl');
  document.getElementById('dr').classList.remove('open');
  rv.style.display='flex';setLni(true);
  rl.innerHTML=recents.size===0?'<p style="color:rgba(180,230,255,.4);text-align:center;margin-top:40px;">No recent apps</p>':'';
  recents.forEach(a=>{const c=document.createElement('div');c.className='rc';c.innerHTML=`<span>${a}</span><div class="xb" onclick="event.stopPropagation();rmRecent('${a}',this)">&times;</div>`;c.onclick=()=>openApp(a);rl.appendChild(c);});
}
function hideRecents(){document.getElementById('rv').style.display='none';setLni(false);}
function clearRecents(){const cs=document.querySelectorAll('.rc');cs.forEach((c,i)=>setTimeout(()=>c.classList.add('closing'),i*80));setTimeout(()=>{recents.clear();hideRecents();},(cs.length*80)+400);}
function setLni(o){document.getElementById('lni').innerHTML=o?'<span id="clrl">Clear</span>':'▢';}
function toggleDr(){beep(440,.06);document.getElementById('rv').style.display='none';document.getElementById('dr').classList.toggle('open');setLni(false);}
function goBack(){
  const aw=document.getElementById('aw'),dr=document.getElementById('dr');
  if(aw.style.display==='flex'){
    aw.style.display='none';dr.classList.add('open');
    stopCam();stopSW();stopMusicAudio();stopSnake();
  }else{dr.classList.remove('open');hideRecents();}
}
function rmRecent(a,el){el.parentElement.classList.add('closing');setTimeout(()=>{recents.delete(a);el.parentElement.remove();if(recents.size===0)hideRecents();},400);}

// ── OPEN APP ─────────────────────────────────────────────────
function openApp(name){
  recents.add(name);
  document.getElementById('dr').classList.remove('open');hideRecents();
  const aw=document.getElementById('aw'),ac=document.getElementById('ac');
  document.getElementById('at').innerText=name;
  aw.style.display='flex';ac.className='wc';ac.style.cssText='';ac.innerHTML='';beep(880,.07);

  if(name==='Music'){ac.className='wc wcp';renderMusic(ac);}
  else if(name==='Clock'){ac.className='wc wcp';renderClock(ac);}
  else if(name==='Calculator'){ac.className='wc wcp';renderCalc(ac);}
  else if(name==='Gallery'){ac.className='wc wcp';renderGallery(ac);}
  else if(name==='Notes'){renderNotes(ac);}
  else if(name==='Camera'){renderCamera(ac);}
  else if(name==='Weather'){ac.className='wc wcp';renderWeather(ac);}
  else if(name==='Browser'){renderBrowser(ac);}
  else if(name==='Files'){ac.className='wc wcp';renderFiles(ac);}
  else if(name==='Todo'){ac.className='wc wcp';renderTodo(ac);}

    </div>
    <div id="mlist"></div>`;
  renderTrackList();
  if(musicPlaying&&curTrack>=0){
    const tn=document.getElementById('tnow'),ta=document.getElementById('tart'),pb=document.getElementById('pbtn');
    if(tn)tn.innerText=tracks[curTrack]?.name||'';if(ta)ta.innerText='Local file';if(pb)pb.innerText='⏸';
    startViz();

function addTracks(inp){
  const files=[...inp.files];let done=0;
  files.forEach(f=>{
    const fr=new FileReader();
    fr.onload=e=>{
      tracks.push({name:f.name.replace(/\.[^.]+$/,''),dataUrl:e.target.result});
      done++;
      if(done===files.length){saveTracks();renderTrackList();const el=document.querySelector('[data-lib]');if(el)el.innerText=`🎵 Library (${tracks.length})`;}
    };fr.readAsDataURL(f);
  });
}
function saveTracks(){LS('aero_tracks',tracks);}
function renderTrackList(){
  const el=document.getElementById('mlist');if(!el)return;
  if(!tracks.length){el.innerHTML='<p style="text-align:center;color:#90a8c0;font-size:.82rem;padding:16px 0;">No tracks. Tap + Add MP3</p>';return;}
  el.innerHTML=tracks.map((t,i)=>`<div class="mtrack${i===curTrack?' active':''}" id="mt${i}" onclick="playTrack(${i})"><div style="width:20px;text-align:center;font-size:.75rem;color:#7090c0;">${i===curTrack&&musicPlaying?'▶':i+1}</div><div style="flex:1;font-size:.85rem;font-weight:600;color:#003080;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.name}</div><div onclick="event.stopPropagation();delTrack(${i})" style="width:22px;height:22px;border-radius:50%;background:rgba(200,50,50,.14);border:1px solid rgba(180,50,50,.28);color:#b03030;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">✕</div></div>`).join('');
}
function playTrack(i){if(i<0||i>=tracks.length)return;curTrack=i;stopMusicAudio(false);musicAudio.src=tracks[i].dataUrl;musicAudio.play().then(()=>{musicPlaying=true;const pb=document.getElementById('pbtn'),tn=document.getElementById('tnow'),ta=document.getElementById('tart');if(pb)pb.innerText='⏸';if(tn)tn.innerText=tracks[i].name;if(ta)ta.innerText='Local file';renderTrackList();startViz();}).catch(()=>{});}
function togglePlay(){if(!tracks.length)return;if(curTrack<0)return playTrack(0);if(musicPlaying){musicAudio.pause();musicPlaying=false;const pb=document.getElementById('pbtn');if(pb)pb.innerText='▶';stopViz();}else{musicAudio.play().then(()=>{musicPlaying=true;const pb=document.getElementById('pbtn');if(pb)pb.innerText='⏸';startViz();}).catch(()=>{});}}
function prevTrack(){if(tracks.length)playTrack((curTrack-1+tracks.length)%tracks.length);}
function nextTrack(){if(tracks.length)playTrack((curTrack+1)%tracks.length);}
function stopMusicAudio(reset=true){musicAudio.pause();if(reset){musicAudio.src='';musicPlaying=false;curTrack=-1;}else musicPlaying=false;stopViz();}
function updateProg(){
  const pf=document.getElementById('pfill'),tc=document.getElementById('tc'),tt=document.getElementById('tt');
  if(!pf)return;const dur=musicAudio.duration||0,cur=musicAudio.currentTime||0;
  if(dur)pf.style.width=(cur/dur*100)+'%';if(tc)tc.innerText=fmtT(cur);if(tt)tt.innerText=fmtT(dur);
}
function fmtT(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return`${m}:${sec.toString().padStart(2,'0')}`;}
function seekAudio(e){if(!musicAudio.duration)return;const r=e.currentTarget.getBoundingClientRect();musicAudio.currentTime=(e.clientX-r.left)/r.width*musicAudio.duration;}
function delTrack(i){if(i===curTrack)stopMusicAudio();tracks.splice(i,1);if(curTrack>i)curTrack--;saveTracks();renderTrackList();}
function startViz(){stopViz();vizIv=setInterval(()=>{document.querySelectorAll('.vb').forEach(b=>b.style.height=(Math.random()*26+3)+'px');},100);}
function stopViz(){clearInterval(vizIv);document.querySelectorAll('.vb').forEach(b=>b.style.height='3px');}

function renderCalc(ac){
  ac.innerHTML=`<div id="cd" style="width:100%;padding:12px 16px;text-align:right;font-size:2rem;font-weight:300;background:linear-gradient(160deg,rgba(220,240,255,.8),rgba(180,220,255,.7));border:1px solid rgba(100,160,220,.4);margin-bottom:12px;border-radius:13px;min-height:65px;color:#0044a0;word-break:break-all;">0</div><div style="font-size:.72rem;color:#7090c0;text-align:right;margin-bottom:8px;" id="cexpr"></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">${['C','±','%','÷','7','8','9','×','4','5','6','−','1','2','3','+','0','.','^','='].map(k=>`<button class="cb" onclick="doCalc('${k}')" style="${k==='='?'background:linear-gradient(180deg,#90d8ff,#1890f0 50%,#0050b0);color:white;grid-column:auto;':''}${k==='0'?'':''}${['C','÷','×','−','+'].includes(k)?'background:linear-gradient(180deg,rgba(220,240,255,.9),#b8d8f0);color:#004080;':''}">${k}</button>`).join('')}</div>`;
}
function doCalc(k){
  const d=document.getElementById('cd'),ex=document.getElementById('cexpr');
  const map={'÷':'/','×':'*','−':'-'};const key=map[k]||k;
  if(k==='C'){calcVal='';if(ex)ex.innerText='';}
  else if(k==='±'){try{calcVal=String(-parseFloat(eval(calcVal)));}catch{}}
  else if(k==='%'){try{calcVal=String(parseFloat(eval(calcVal))/100);}catch{}}
  else if(k==='^'){calcVal+='**';}
  else if(k==='='){try{if(ex)ex.innerText=calcVal;calcVal=String(eval(calcVal));}catch{calcVal='Error';}}
  else calcVal+=key;
  d.innerText=calcVal||'0';beep(660,.05);
}

let lastSnapDataUrl=null,lastSnapName=null;
async function startCam(){
  const info=document.getElementById('cinfo'),err=document.getElementById('cerr'),vid=document.getElementById('wcam');
  if(info)info.innerText='Requesting camera…';if(err)err.style.display='none';
  try{
    if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:camFace},width:{ideal:1280},height:{ideal:720}},audio:false});
    if(!document.getElementById('wcam'))return;
    vid.srcObject=camStream;await vid.play();
    if(info)info.innerText='📷 Ready  •  Tap 📸 to capture';
  }catch(e){if(info)info.innerText='';if(err)err.style.display='flex';}
}
function flipCam(){camFace=camFace==='user'?'environment':'user';startCam();}
function stopCam(){if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}}
function snapPhoto(){
  const v=document.getElementById('wcam'),c=document.getElementById('scnv'),fl=document.getElementById('cflash');
  if(!v||!c)return;
  c.width=v.videoWidth||640;c.height=v.videoHeight||480;
  c.getContext('2d').drawImage(v,0,0);
  lastSnapDataUrl=c.toDataURL('image/jpeg',.88);
  lastSnapName='Photo_'+new Date().toISOString().slice(0,19).replace(/[:.]/g,'-')+'.jpg';
  const sp=document.getElementById('sprev'),sr=document.getElementById('snaprow'),sn=document.getElementById('snapname');
  if(sp){sp.src=lastSnapDataUrl;}if(sr)sr.style.display='flex';if(sn)sn.innerText=lastSnapName;
  if(fl){fl.style.opacity=1;setTimeout(()=>fl.style.opacity=0,180);}
  beep(1200,.08);
}
async function saveSnapToGallery(){
  if(!lastSnapDataUrl)return;
  await IDB.savePhoto(lastSnapDataUrl,lastSnapName);
  const sr=document.getElementById('snaprow'),sn=document.getElementById('snapname');
  if(sn)sn.innerText='✅ Saved to Gallery!';
  setTimeout(()=>{if(sr)sr.style.display='none';lastSnapDataUrl=null;},1800);

}

let paintTool='pen',paintDrawing=false,paintLast=null;
function initPaint(){
  const cnv=document.getElementById('paintcnv'),ctx=cnv.getContext('2d');
  const resize=()=>{const d=cnv.toDataURL();cnv.width=cnv.offsetWidth;cnv.height=cnv.offsetHeight;const img=new Image();img.onload=()=>ctx.drawImage(img,0,0);img.src=d;};
  setTimeout(resize,50);
  const getPos=e=>{const r=cnv.getBoundingClientRect();const src=e.touches?e.touches[0]:e;return{x:src.clientX-r.left,y:src.clientY-r.top};};
  const down=e=>{e.preventDefault();const p=getPos(e);if(paintTool==='fill'){floodFill(ctx,Math.round(p.x),Math.round(p.y),document.getElementById('pc').value);return;}paintDrawing=true;paintLast=p;ctx.beginPath();ctx.arc(p.x,p.y,1,0,Math.PI*2);ctx.fillStyle=paintTool==='erase'?'white':document.getElementById('pc').value;ctx.fill();};
  const move=e=>{e.preventDefault();if(!paintDrawing)return;const p=getPos(e),sz=parseInt(document.getElementById('ps').value);ctx.beginPath();ctx.moveTo(paintLast.x,paintLast.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle=paintTool==='erase'?'white':document.getElementById('pc').value;ctx.lineWidth=paintTool==='erase'?sz*3:sz;ctx.lineCap='round';ctx.stroke();paintLast=p;};
  const up=()=>{paintDrawing=false;};
  cnv.addEventListener('mousedown',down);cnv.addEventListener('mousemove',move);cnv.addEventListener('mouseup',up);
  cnv.addEventListener('touchstart',down,{passive:false});cnv.addEventListener('touchmove',move,{passive:false});cnv.addEventListener('touchend',up);
}
function setPaintTool(t){paintTool=t;}
function clearCanvas(){const cnv=document.getElementById('paintcnv');if(cnv){const ctx=cnv.getContext('2d');ctx.clearRect(0,0,cnv.width,cnv.height);ctx.fillStyle='white';ctx.fillRect(0,0,cnv.width,cnv.height);}}
async function savePainting(){const cnv=document.getElementById('paintcnv');if(!cnv)return;const url=cnv.toDataURL('image/png');const name='Painting_'+Date.now()+'.png';await IDB.savePhoto(url,name);beep(880,.15);alert('Painting saved to Gallery! 🎨');}
function floodFill(ctx,x,y,fillColor){
  const w=ctx.canvas.width,h=ctx.canvas.height;
  const imgData=ctx.getImageData(0,0,w,h);const data=imgData.data;
  const idx=(x+y*w)*4;
  const sr=data[idx],sg=data[idx+1],sb=data[idx+2],sa=data[idx+3];
  const fc=parseInt(fillColor.slice(1),16);
  const fr=(fc>>16)&255,fg=(fc>>8)&255,fb=fc&255;
  if(sr===fr&&sg===fg&&sb===fb)return;
  const stack=[[x,y]];
  const match=i=>data[i]===sr&&data[i+1]===sg&&data[i+2]===sb&&data[i+3]===sa;
  const set=i=>{data[i]=fr;data[i+1]=fg;data[i+2]=fb;data[i+3]=255;};
  while(stack.length){const[cx,cy]=stack.pop();if(cx<0||cx>=w||cy<0||cy>=h)continue;const ci=(cx+cy*w)*4;if(!match(ci))continue;set(ci);stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);}
  ctx.putImageData(imgData,0,0);
}

// ═══════════ SNAKE ═══════════════════════════════════════════
function renderSnake(ac){
  ac.style.cssText='display:flex;flex-direction:column;padding:10px;align-items:center;gap:8px;';
  ac.innerHTML=`
    <div style="font-weight:700;color:#003080;font-size:1rem;">🐍 Snake  <span id="sscore" style="color:#10a040;">Score: 0</span>  <span id="shi" style="color:#e07000;font-size:.85rem;">Best: ${LS('aero_snake_hi')||0}</span></div>
    <canvas id="scnv2" width="280" height="280" style="border-radius:14px;border:2px solid rgba(100,180,255,.4);background:#001830;cursor:pointer;touch-action:none;"></canvas>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:200px;">
      <div></div>
      <button class="ab" style="padding:10px;" ontouchstart="snakeDir(0,-1)" onclick="snakeDir(0,-1)">▲</button>
      <div></div>
      <button class="ab" style="padding:10px;" ontouchstart="snakeDir(-1,0)" onclick="snakeDir(-1,0)">◀</button>
      <button class="ab b" style="padding:10px;" id="sbtn" onclick="startSnake()">▶</button>
      <button class="ab" style="padding:10px;" ontouchstart="snakeDir(1,0)" onclick="snakeDir(1,0)">▶</button>
      <div></div>
      <button class="ab" style="padding:10px;" ontouchstart="snakeDir(0,1)" onclick="snakeDir(0,1)">▼</button>
      <div></div>
    </div>`;
  startSnake();
}
function startSnake(){
  stopSnake();
  const cnv=document.getElementById('scnv2');if(!cnv)return;
  const ctx=cnv.getContext('2d'),S=20,COLS=cnv.width/S,ROWS=cnv.height/S;
  let snake=[{x:10,y:10}],dir={x:1,y:0},nextDir={x:1,y:0},food=rFood(),score=0,running=true;
  function rFood(){let f;do{f={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}while(snake.some(s=>s.x===f.x&&s.y===f.y));return f;}
  function draw(){
    ctx.fillStyle='#001830';ctx.fillRect(0,0,cnv.width,cnv.height);
    ctx.fillStyle='#ff4040';ctx.beginPath();ctx.arc((food.x+.5)*S,(food.y+.5)*S,S*.4,0,Math.PI*2);ctx.fill();
    snake.forEach((s,i)=>{
      const g=ctx.createLinearGradient(s.x*S,s.y*S,(s.x+1)*S,(s.y+1)*S);
      g.addColorStop(0,i===0?'#80ff80':'#40c060');g.addColorStop(1,i===0?'#20c040':'#206030');
      ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(s.x*S+1,s.y*S+1,S-2,S-2,4);ctx.fill();
    });
  }
  function step(){
    if(!running)return;dir=nextDir;
    const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
    if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
      running=false;stopSnake();ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,cnv.height/2-30,cnv.width,60);
      ctx.fillStyle='white';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText('Game Over! Score: '+score,cnv.width/2,cnv.height/2+7);
      const hi=LS('aero_snake_hi')||0;if(score>hi){LS('aero_snake_hi',score);const shi=document.getElementById('shi');if(shi)shi.innerText='Best: '+score;}return;
    }
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){score++;food=rFood();beep(660,.05);const ss=document.getElementById('sscore');if(ss)ss.innerText='Score: '+score;}
    else snake.pop();
    draw();
  }
  snakeGame=setInterval(step,140);draw();
  window._snakeDir=(dx,dy)=>{if((dx!==0&&dir.x===0)||(dy!==0&&dir.y===0))nextDir={x:dx,y:dy};};
  document.onkeydown=e=>{const m={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};if(m[e.key]){e.preventDefault();window._snakeDir(...m[e.key]);}};
}
function stopSnake(){clearInterval(snakeGame);snakeGame=null;document.onkeydown=null;}
function snakeDir(dx,dy){if(window._snakeDir)window._snakeDir(dx,dy);}

  const msgs=document.getElementById('chatmsgs');
  if(msgs){msgs.innerHTML+=`<div style="display:flex;justify-content:flex-end;"><div class="conv-bubble conv-me">${msg}</div></div>`;msgs.innerHTML+=`<div id="typing" style="display:flex;justify-content:flex-start;"><div class="conv-bubble conv-them" style="opacity:.6;">Thinking…</div></div>`;scrollChat();}
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:'You are a friendly helpful assistant inside Ta-seen OS, a Frutiger Aero styled mobile OS. Keep answers concise.',messages:history.map(m=>({role:m.role,content:m.content}))})});
    const data=await res.json();
    const reply=data.content?.[0]?.text||'Sorry, I could not respond.';
    history.push({role:'assistant',content:reply});LS('aero_chat',history.slice(-40));
    const typing=document.getElementById('typing');if(typing)typing.outerHTML=`<div style="display:flex;justify-content:flex-start;"><div class="conv-bubble conv-them">${reply}</div></div>`;
  }catch(e){
    const typing=document.getElementById('typing');if(typing)typing.outerHTML=`<div style="display:flex;justify-content:flex-start;"><div class="conv-bubble conv-them">I'm offline right now. Try again later!</div></div>`;
  }
  scrollChat();
}
function scrollChat(){const m=document.getElementById('chatmsgs');if(m)m.scrollTop=m.scrollHeight;}

// ═══════════ CONVERTER ═══════════════════════════════════════
function renderConverter(ac){
  ac.innerHTML=`
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;">
      ${['Length','Weight','Temp','Currency','Speed'].map(t=>`<button class="ab${convTab===t?' b':''}" style="padding:7px 12px;font-size:.8rem;" onclick="switchConv('${t}')">${t}</button>`).join('')}
    </div>
    <div id="convbody"></div>`;
  drawConv();
}
let convTab='Length';
const convDefs={
  Length:{units:['m','km','cm','mm','inch','ft','mile','yard'],base:{km:1000,cm:.01,mm:.001,inch:.0254,ft:.3048,mile:1609.34,yard:.9144,m:1}},
  Weight:{units:['kg','g','lb','oz','ton'],base:{g:.001,lb:.453592,oz:.0283495,ton:1000,kg:1}},
  Speed:{units:['m/s','km/h','mph','knot'],base:{'km/h':1/3.6,'mph':0.44704,'knot':0.514444,'m/s':1}},
};
function switchConv(t){convTab=t;const ac=document.getElementById('ac');if(ac)renderConverter(ac);}
function drawConv(){
  const el=document.getElementById('convbody');if(!el)return;
  if(convTab==='Temp'){
    el.innerHTML=`<div class="ap"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">${[['°C','Celsius'],['°F','Fahrenheit'],['K','Kelvin']].map(([u,l])=>`<div><label style="font-size:.75rem;color:#5090c0;">${l}</label><input id="tmp_${u}" type="number" placeholder="0" style="width:100%;padding:9px 12px;border:1px solid rgba(100,160,220,.4);border-radius:10px;background:rgba(255,255,255,.85);font-size:1rem;outline:none;color:#003080;margin-top:4px;" oninput="convTemp('${u}',this.value)"></div>`).join('')}</div></div>`;
  }else if(convTab==='Currency'){
    el.innerHTML=`<div class="ap"><p style="font-size:.8rem;color:#5090c0;margin-bottom:10px;">Approximate rates (USD base)</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">${[['USD','🇺🇸 Dollar',1],['EUR','🇪🇺 Euro',0.92],['BDT','🇧🇩 Taka',110],['GBP','🇬🇧 Pound',0.79],['JPY','🇯🇵 Yen',149],['INR','🇮🇳 Rupee',83]].map(([c,l,r])=>`<div><label style="font-size:.72rem;color:#5090c0;">${l}</label><input id="cur_${c}" type="number" placeholder="0" data-rate="${r}" style="width:100%;padding:9px 12px;border:1px solid rgba(100,160,220,.4);border-radius:10px;background:rgba(255,255,255,.85);font-size:.95rem;outline:none;color:#003080;margin-top:3px;" oninput="convCur('${c}',this.value)"></div>`).join('')}</div></div>`;
  }else{
    const def=convDefs[convTab];
    el.innerHTML=`<div class="ap"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">${def.units.map(u=>`<div><label style="font-size:.75rem;color:#5090c0;">${u}</label><input id="cv_${u}" type="number" placeholder="0" style="width:100%;padding:9px 12px;border:1px solid rgba(100,160,220,.4);border-radius:10px;background:rgba(255,255,255,.85);font-size:.95rem;outline:none;color:#003080;margin-top:4px;" oninput="convUnit('${u}',this.value,'${convTab}')"></div>`).join('')}</div></div>`;
  }
}
function convUnit(from,val,type){
  const def=convDefs[type];const baseVal=parseFloat(val)*(def.base[from]||1);
  def.units.forEach(u=>{if(u===from)return;const el=document.getElementById('cv_'+u);if(el)el.value=u===from?val:(baseVal/(def.base[u]||1)).toFixed(6).replace(/\.?0+$/,'');});
}
function convTemp(from,val){
  const v=parseFloat(val);let c;
  if(from==='°C')c=v;else if(from==='°F')c=(v-32)/1.8;else c=v-273.15;
  const res={'°C':c,'°F':c*1.8+32,'K':c+273.15};
  Object.entries(res).forEach(([u,r])=>{if(u===from)return;const el=document.getElementById('tmp_'+u);if(el)el.value=r.toFixed(4).replace(/\.?0+$/,'');});
}
function convCur(from,val){
  const v=parseFloat(val);const rate=parseFloat(document.querySelector(`[id="cur_${from}"]`)?.dataset?.rate||1);const usd=v/rate;
  document.querySelectorAll('[id^="cur_"]').forEach(el=>{if(el.id==='cur_'+from)return;const r=parseFloat(el.dataset.rate||1);el.value=(usd*r).toFixed(4).replace(/\.?0+$/,'');});
}

// ═══════════ RESTORE ═════════════════════════════════════════
function restoreSettings(){
  const cwp=LS('aero_custom_wp');
  if(cwp){document.getElementById('os').style.backgroundImage=`url('${cwp}')`;}
  else{const wp=LS('aero_wp');if(wp)document.getElementById('os').style.setProperty('--current-wp',`var(--wp-${wp})`);}
  const br=LS('aero_bright');if(br)document.getElementById('os').style.filter=`brightness(${br/100})`;
  const fs=LS('aero_fs');if(fs)document.documentElement.style.setProperty('--fs',fs+'px');
  tracks=LS('aero_tracks')||[];
  alarms=LS('aero_alarms')||[];
}
function setCamWP(dataUrl){document.getElementById('os').style.backgroundImage=`url('${dataUrl}')`;LS('aero_custom_wp',dataUrl);beep(1100,.1);}
